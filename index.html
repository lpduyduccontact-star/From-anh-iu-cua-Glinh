<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚨 Emergency Apology Machine 🚨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#ffe3f1;
    --bg-2:#ffb6d9;
    --panel:#fff3f8;
    --panel-edge:#3a2036;
    --accent:#ff6fa5;
    --accent-dark:#d94f88;
    --ink:#4a2545;
    --gold:#ffe066;
    --mint:#b6f5d8;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 20% 15%, #fff0f8 0%, transparent 40%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    font-family:'VT323', monospace;
    color:var(--ink);
    overflow-x:hidden;
    image-rendering:pixelated;
  }
  #hearts-bg{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .floaty{
    position:absolute;
    bottom:-10%;
    font-size:18px;
    opacity:.55;
    animation:rise linear infinite;
    filter:drop-shadow(1px 1px 0 rgba(0,0,0,.08));
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.55; }
    100%{ transform:translateY(-115vh) translateX(var(--drift,20px)) rotate(25deg); opacity:0; }
  }

  .wrap{
    position:relative;
    z-index:1;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 14px 40px;
  }

  h1{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(14px, 4vw, 22px);
    text-align:center;
    color:var(--accent-dark);
    text-shadow:
      2px 2px 0 #fff,
      4px 4px 0 var(--panel-edge);
    letter-spacing:1px;
    line-height:1.6;
    margin:0 0 6px;
  }
  .subtitle{
    font-family:'VT323', monospace;
    font-size:20px;
    color:var(--ink);
    opacity:.75;
    text-align:center;
    margin:0 0 22px;
  }

  .console{
    width:min(360px, 92vw);
    background:var(--panel);
    border:4px solid var(--panel-edge);
    box-shadow:
      0 0 0 4px var(--gold),
      8px 8px 0 0 var(--panel-edge);
    padding:20px 18px 24px;
    position:relative;
  }
  .console::before{
    content:"";
    position:absolute;
    top:-4px; left:-4px; right:-4px; bottom:-4px;
    border:4px dashed rgba(255,255,255,.5);
    pointer-events:none;
  }

  .level{
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    text-align:center;
    color:var(--accent-dark);
    margin-bottom:10px;
    letter-spacing:1px;
  }

  .stage-wobble{ animation: wobble .5s ease; }
  @keyframes wobble{
    0%{ transform:translateX(0) rotate(0); }
    20%{ transform:translateX(-4px) rotate(-1.5deg); }
    40%{ transform:translateX(4px) rotate(1.5deg); }
    60%{ transform:translateX(-3px) rotate(-1deg); }
    80%{ transform:translateX(3px) rotate(1deg); }
    100%{ transform:translateX(0) rotate(0); }
  }

  .sprite-stage{
    display:flex;
    justify-content:center;
    margin:4px 0 14px;
  }
  .sprite{
    position:relative;
    width:168px;
    height:168px;
  }
  .sprite-pixel{
    position:absolute;
    top:0; left:0;
    width:14px;
    height:14px;
    background:transparent;
  }

  .hearts-meter{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:0 0 16px;
    font-size:22px;
    filter:drop-shadow(1px 1px 0 rgba(0,0,0,.15));
  }
  .hearts-meter span{ transition:transform .25s ease; }
  .hearts-meter span.pop{ animation:heartpop .4s ease; }
  @keyframes heartpop{
    0%{ transform:scale(0.4) rotate(-10deg); }
    60%{ transform:scale(1.3) rotate(8deg); }
    100%{ transform:scale(1) rotate(0); }
  }

  .message-box{
    background:#fff;
    border:3px solid var(--panel-edge);
    box-shadow: inset 0 0 0 2px #ffd7ea;
    min-height:78px;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    margin-bottom:18px;
  }
  .message-box p{
    margin:0;
    font-size:22px;
    line-height:1.35;
    color:var(--ink);
  }

  button#pressme{
    display:block;
    width:100%;
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    color:#fff;
    background:var(--accent);
    border:3px solid var(--panel-edge);
    padding:16px 10px;
    cursor:pointer;
    box-shadow: 0 6px 0 var(--accent-dark), 0 6px 0 3px var(--panel-edge);
    letter-spacing:1px;
    transition:transform .05s ease;
  }
  button#pressme:hover{ filter:brightness(1.06); }
  button#pressme:active{
    transform:translateY(6px);
    box-shadow:0 0 0 var(--accent-dark), 0 0 0 3px var(--panel-edge);
  }

  footer{
    margin-top:20px;
    font-family:'VT323', monospace;
    font-size:16px;
    opacity:.6;
    text-align:center;
  }

  .confetti{
    position:fixed;
    top:-30px;
    font-size:20px;
    pointer-events:none;
    animation:fall linear forwards;
    z-index:5;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .floaty, .stage-wobble, .hearts-meter span.pop, .confetti{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<div class="wrap">
  <h1>🚨 EMERGENCY<br>APOLOGY MACHINE 🚨</h1>
  <p class="subtitle">insert love, receive forgiveness</p>

  <div class="console">
    <div class="level" id="level">LEVEL 1 / 7</div>

    <div class="sprite-stage">
      <div class="sprite" id="sprite"></div>
    </div>

    <div class="hearts-meter" id="heartsMeter"></div>

    <div class="message-box">
      <p id="message">Something's wrong. Let's fix it.</p>
    </div>

    <button id="pressme">🚨 PRESS ME 🚨</button>
  </div>

  <footer>insert coin to keep loving each other 🪙</footer>
</div>

<script>
// ---------- pixel cat sprite ----------
const COLORS = { B:'#3a2036', W:'#fff6fb', C:'#ff8fb3', R:'#ff4d6d', K:'#2b1b2e', H:'#ff2d78' };
const PX = 14;

const BASE = {
  r0: '..B......B..',
  r1: '.BW......WB.',
  r2: '.BWWBBBBWWB.',
  r3: '.BWWWWWWWWB.',
  r5: '.BWWWWWWWWB.',
  r6: '.BCWWWWWWCB.',
  r8: '.BWWWWWWWWB.',
  r9: '..BWWWWWWB..',
  r10:'..BBBBBBBB..',
  r11:'............'
};

const MOODS = {
  angry: {
    r3: '.BWBWWWWBWB.',
    r4: '.BWRRWWRRWB.',
    r6: '.BRWWWWWWRB.',
    r7: '.BWWRRRRWWB.',
    r8: BASE.r8
  },
  sorry: {
    r3: BASE.r3,
    r4: '.BWKKWWKKWB.',
    r6: BASE.r6,
    r7: '.BWWWBBWWWB.',
    r8: BASE.r8
  },
  hopeful: {
    r3: BASE.r3,
    r4: '.BWKKWWKKWB.',
    r6: BASE.r6,
    r7: '.BWWBWWBWWB.',
    r8: BASE.r8
  },
  happy: {
    r3: BASE.r3,
    r4: '.BWHHWWHHWB.',
    r6: BASE.r6,
    r7: '.BWWBBBBWWB.',
    r8: '.BWBWWWWBWB.'
  }
};

function buildGrid(mood){
  const m = MOODS[mood];
  return [BASE.r0, BASE.r1, BASE.r2, m.r3, m.r4, BASE.r5, m.r6, m.r7, m.r8, BASE.r9, BASE.r10, BASE.r11];
}

function gridToShadow(grid){
  let parts = [];
  grid.forEach((row, r) => {
    for(let c=0;c<row.length;c++){
      const ch = row[c];
      if(COLORS[ch]){
        parts.push(`${c*PX}px ${r*PX}px 0 ${COLORS[ch]}`);
      }
    }
  });
  return parts.join(',');
}

const spriteEl = document.getElementById('sprite');
const pixelBase = document.createElement('div');
pixelBase.className = 'sprite-pixel';
spriteEl.appendChild(pixelBase);

function setMood(mood){
  pixelBase.style.boxShadow = gridToShadow(buildGrid(mood));
}

// ---------- stages ----------
const STAGES = [
  { mood:'angry',   text:"Something's wrong. Let's fix it.", hearts:0 },
  { mood:'angry',   text:"Okay. I know you're mad.", hearts:1 },
  { mood:'sorry',   text:"And you have every right to be.", hearts:2 },
  { mood:'sorry',   text:"I'm sorry. For real.", hearts:3 },
  { mood:'hopeful', text:"I'll do better. I mean it.", hearts:4 },
  { mood:'hopeful', text:"Can I earn a hug now? 🤗", hearts:4 },
  { mood:'happy',   text:"❤️ Forgiveness: loading complete ❤️", hearts:5, final:true },
];

const BUTTON_LABELS = [
  "🚨 PRESS ME 🚨",
  "PRESS TO CONTINUE",
  "PRESS TO CONTINUE",
  "PRESS TO CONTINUE",
  "PRESS TO CONTINUE",
  "PRESS TO CONTINUE",
  "PLAY AGAIN ↺"
];

let stage = 0;
const consoleEl = document.querySelector('.console');
const levelEl = document.getElementById('level');
const messageEl = document.getElementById('message');
const buttonEl = document.getElementById('pressme');
const heartsMeterEl = document.getElementById('heartsMeter');

function renderHearts(count){
  heartsMeterEl.innerHTML = '';
  for(let i=0;i<5;i++){
    const span = document.createElement('span');
    span.textContent = i < count ? '❤️' : '🤍';
    if(i === count-1) span.classList.add('pop');
    heartsMeterEl.appendChild(span);
  }
}

function render(){
  const s = STAGES[stage];
  setMood(s.mood);
  messageEl.textContent = s.text;
  levelEl.textContent = `LEVEL ${stage+1} / ${STAGES.length}`;
  renderHearts(s.hearts);
  buttonEl.textContent = BUTTON_LABELS[stage];

  consoleEl.classList.remove('stage-wobble');
  void consoleEl.offsetWidth;
  consoleEl.classList.add('stage-wobble');

  if(s.final){
    burstConfetti();
  }
}

function burstConfetti(){
  const symbols = ['❤️','💗','💌','✨','🩷'];
  for(let i=0;i<26;i++){
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (2.5 + Math.random()*2) + 's';
    el.style.fontSize = (14 + Math.random()*16) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

buttonEl.addEventListener('click', () => {
  if(STAGES[stage].final){
    stage = 0;
  } else {
    stage = Math.min(stage+1, STAGES.length-1);
  }
  render();
});

render();

// ---------- floating background hearts ----------
const bg = document.getElementById('hearts-bg');
const bgSymbols = ['🩷','💗','💕','❤️','✨'];
for(let i=0;i<16;i++){
  const el = document.createElement('div');
  el.className = 'floaty';
  el.textContent = bgSymbols[Math.floor(Math.random()*bgSymbols.length)];
  el.style.left = Math.random()*100 + '%';
  el.style.setProperty('--drift', (Math.random()*80-40)+'px');
  el.style.animationDuration = (9 + Math.random()*10) + 's';
  el.style.animationDelay = (Math.random()*10) + 's';
  el.style.fontSize = (12 + Math.random()*14) + 'px';
  bg.appendChild(el);
}
</script>
</body>
</html>
